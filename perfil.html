<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil | Sons Bwe Fixes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body { background:#0d1220; }
    .input-sbf {
      width:100%; background:rgba(255,255,255,.05);
      border:1px solid rgba(49,69,149,.3); border-radius:.875rem;
      padding:.875rem 1rem; color:#fff;
      font-family:'Barlow Condensed',sans-serif; font-size:.98rem; outline:none;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-sbf:focus { border-color:#ec9731; box-shadow:0 0 0 3px rgba(236,151,49,.12); }
    .input-sbf::placeholder { color:rgba(255,255,255,.3); }
    .label-sbf {
      font-family:'Barlow Condensed',sans-serif; font-size:.72rem; font-weight:700;
      text-transform:uppercase; letter-spacing:.15em; color:rgba(255,255,255,.4);
      display:block; margin-bottom:6px;
    }
    .btn-save {
      width:100%; background:#ec9731; color:#fff; border:none;
      border-radius:1rem; padding:.9rem;
      font-family:'Anton',sans-serif; font-size:1rem; letter-spacing:2px;
      cursor:pointer; transition: transform .2s, box-shadow .2s;
    }
    .btn-save:hover  { transform:translateY(-2px); box-shadow:0 8px 24px rgba(236,151,49,.3); }
    .btn-save:active { transform:scale(.97); }
    .tab-stat {
      font-family:'Barlow Condensed',sans-serif; font-size:.7rem; font-weight:700;
      text-transform:uppercase; letter-spacing:.12em; color:rgba(255,255,255,.35);
    }
    .tab-num {
      font-family:'Anton',sans-serif; font-size:1.6rem; letter-spacing:1px;
    }
    .section-title {
      font-family:'Anton',sans-serif; font-size:1.15rem; letter-spacing:1.5px;
      text-transform:uppercase; margin-bottom:1.25rem;
    }
    .music-card {
      display:flex; align-items:center; gap:1rem; padding:1rem;
      border-radius:1.25rem; border:1px solid rgba(49,69,149,.25);
      transition: border-color .2s, background .2s; cursor:pointer;
    }
    .music-card:hover { background:rgba(49,69,149,.12); border-color:rgba(236,151,49,.3); }
    .badge-role {
      display:inline-block; padding:3px 12px; border-radius:20px;
      font-family:'Barlow Condensed',sans-serif; font-size:.68rem; font-weight:700;
      text-transform:uppercase; letter-spacing:1.5px;
    }
  </style>
</head>
<body class="text-white min-h-screen flex flex-col md:flex-row overflow-hidden">

  <!-- ══ SIDEBAR / FORMULÁRIO ══ -->
  <aside class="w-full md:w-80 flex-shrink-0 flex flex-col p-8 h-screen sticky top-0 overflow-y-auto"
         style="background:#0e1525;border-right:1px solid rgba(49,69,149,.25)">

    <!-- Marca -->
    <div class="mb-6">
      <div style="font-family:'Anton',sans-serif;font-size:1.1rem;letter-spacing:1.5px;text-transform:uppercase">SONS BWE</div>
      <div style="font-family:'Anton',sans-serif;font-size:1.4rem;color:#ec9731;letter-spacing:2px;text-transform:uppercase;line-height:1">FIXES</div>
      <p style="font-family:'Barlow Condensed',sans-serif;font-size:.68rem;color:rgba(255,255,255,.3);letter-spacing:3px;text-transform:uppercase">Painel do Ouvinte</p>
    </div>

    <div class="space-y-5 flex-1">
      <div>
        <label class="label-sbf">Nome de Exibição</label>
        <input class="input-sbf" type="text" id="edit-nome" placeholder="Teu nome / nickname">
      </div>

      <div style="opacity:.6">
        <label class="label-sbf">E-mail (Privado)</label>
        <div id="user-email-display" style="font-family:'Barlow Condensed',sans-serif;font-size:.9rem;padding:.5rem 0;color:rgba(255,255,255,.6)">a carregar...</div>
      </div>

      <div>
        <label class="label-sbf">Localização</label>
        <input class="input-sbf" type="text" id="edit-local" placeholder="Ex: Luanda, AO">
      </div>

      <div>
        <label class="label-sbf">Contacto</label>
        <input class="input-sbf" type="tel" id="edit-tel" placeholder="+244 ...">
      </div>

      <div>
        <label class="label-sbf">Gostos Musicais</label>
        <textarea class="input-sbf" id="edit-gostos" rows="3"
                  style="resize:none" placeholder="Ex: Kizomba, Rap, Semba..."></textarea>
      </div>

      <button class="btn-save" onclick="salvarPerfil()">GUARDAR ALTERAÇÕES</button>
    </div>

    <!-- Rank Card -->
    <div class="mt-6 pt-5" style="border-top:1px solid rgba(49,69,149,.25)">
      <div class="glass p-4 rounded-2xl flex items-center justify-between"
           style="border:1px solid rgba(49,69,149,.3)">
        <div>
          <p class="tab-stat">Rank de Ouvinte</p>
          <p style="font-family:'Anton',sans-serif;font-size:1rem;color:#4ade80;letter-spacing:1px">NÍVEL <span id="rank-nivel">—</span></p>
        </div>
        <div class="text-right">
          <p class="tab-num" id="total-plays">—</p>
          <p class="tab-stat">Plays</p>
        </div>
      </div>
    </div>
  </aside>

  <!-- ══ CONTEÚDO PRINCIPAL ══ -->
  <main class="flex-1 overflow-y-auto" style="background:#0d1220">

    <!-- Barra de Topo -->
    <div class="flex items-center justify-between px-8 py-5"
         style="border-bottom:1px solid rgba(49,69,149,.2)">
      <a href="index.html"
         class="w-10 h-10 glass rounded-full flex items-center justify-center transition"
         style="border:1px solid rgba(49,69,149,.3)"
         onmouseover="this.style.borderColor='#ec9731'" onmouseout="this.style.borderColor='rgba(49,69,149,.3)'">
        <i class="fa-solid fa-house text-sm" style="color:rgba(255,255,255,.6)"></i>
      </a>

      <div class="flex items-center gap-3">
        <span id="nav-nome" style="font-family:'Barlow Condensed',sans-serif;font-size:.9rem;color:rgba(255,255,255,.5)">a carregar...</span>
        <button onclick="sair()"
          class="flex items-center gap-2 px-5 py-2 rounded-full transition"
          style="background:rgba(239,60,84,.1);border:1px solid rgba(239,60,84,.25);font-family:'Barlow Condensed',sans-serif;font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#EF3C54;cursor:pointer"
          onmouseover="this.style.background='rgba(239,60,84,.25)'" onmouseout="this.style.background='rgba(239,60,84,.1)'">
          <i class="fa-solid fa-power-off text-xs"></i> Sair
        </button>
      </div>
    </div>

    <div class="px-8 py-10 max-w-3xl mx-auto">

      <!-- Avatar + Nome -->
      <section class="flex flex-col items-center mb-12 animate-fade-in">
        <div class="relative">
          <!-- Avatar -->
          <div class="w-36 h-36 rounded-[2rem] overflow-hidden flex items-center justify-center shadow-2xl"
               style="border:3px solid #314595;background:rgba(49,69,149,.2)">
            <img id="display-photo" src="" class="w-full h-full object-cover hidden" alt="Avatar">
            <span id="display-initial"
                  style="font-family:'Anton',sans-serif;font-size:3.5rem;color:#314595;letter-spacing:0">?</span>
          </div>

          <!-- Botões de foto -->
          <div class="absolute -bottom-2 -right-2 flex flex-col gap-2">
            <label for="upload-photo"
                   class="w-10 h-10 rounded-2xl flex items-center justify-center cursor-pointer transition shadow-xl"
                   style="background:#314595"
                   onmouseover="this.style.background='#ec9731'" onmouseout="this.style.background='#314595'">
              <i class="fa-solid fa-cloud-arrow-up text-xs text-white"></i>
              <input type="file" id="upload-photo" class="hidden" accept="image/*" onchange="processarFoto(this)">
            </label>
            <button onclick="abrirCamera()"
                    class="w-10 h-10 rounded-2xl flex items-center justify-center transition shadow-xl"
                    style="background:#ec9731;border:none;cursor:pointer"
                    onmouseover="this.style.background='#d4841f'" onmouseout="this.style.background='#ec9731'">
              <i class="fa-solid fa-camera text-xs text-white"></i>
            </button>
          </div>
        </div>

        <h2 id="display-name"
            style="font-family:'Anton',sans-serif;font-size:2rem;letter-spacing:1.5px;text-transform:uppercase;margin-top:1.5rem;margin-bottom:6px">
          UTILIZADOR
        </h2>

        <span id="display-role" class="badge-role" style="background:rgba(49,69,149,.25);color:#8ea3e8">OUVINTE</span>
      </section>

      <!-- Stats Rápidas -->
      <section class="grid grid-cols-3 gap-4 mb-10">
        <div class="glass rounded-2xl p-5 text-center" style="border:1px solid rgba(49,69,149,.3)">
          <p class="tab-num text-white" id="stat-likes">—</p>
          <p class="tab-stat mt-1">Likes</p>
        </div>
        <div class="glass rounded-2xl p-5 text-center" style="border:1px solid rgba(49,69,149,.3)">
          <p class="tab-num" id="stat-plays" style="color:#ec9731">—</p>
          <p class="tab-stat mt-1">Plays</p>
        </div>
        <div class="glass rounded-2xl p-5 text-center" style="border:1px solid rgba(49,69,149,.3)">
          <p class="tab-num" id="stat-downloads" style="color:#4ade80">—</p>
          <p class="tab-stat mt-1">Downloads</p>
        </div>
      </section>

      <!-- Mais Ouvidas -->
      <section class="mb-10">
        <div class="section-title">🔥 Mais Ouvidas por Ti</div>
        <div id="lista-mais-ouvidas" class="space-y-3">
          <div class="music-card" style="background:rgba(25,32,53,.5)">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:rgba(49,69,149,.3)">
              <i class="fa-solid fa-music text-xs" style="color:rgba(255,255,255,.4)"></i>
            </div>
            <p style="font-family:'Barlow Condensed',sans-serif;font-size:.88rem;color:rgba(255,255,255,.35)">A carregar histórico...</p>
          </div>
        </div>
      </section>

      <!-- Músicas com Like -->
      <section class="mb-10">
        <div class="section-title">❤️ Os Teus Favoritos</div>
        <div id="lista-favoritos" class="space-y-3">
          <div class="music-card" style="background:rgba(25,32,53,.5)">
            <p style="font-family:'Barlow Condensed',sans-serif;font-size:.88rem;color:rgba(255,255,255,.35)">A carregar favoritos...</p>
          </div>
        </div>
      </section>

    </div><!-- /max-w -->
  </main>

  <!-- Toast -->
  <div id="toast" class="opacity-0 scale-90 pointer-events-none">
    <div class="glass border px-8 py-4 rounded-[2rem] shadow-2xl flex items-center gap-4 min-w-[280px]"
         style="border-color:rgba(49,69,149,.35)">
      <div id="toast-icon-box" class="w-10 h-10 rounded-full flex items-center justify-center">
        <i id="toast-icon" class="fa-solid"></i>
      </div>
      <div>
        <p id="toast-title" class="font-bold text-xs uppercase tracking-widest" style="font-family:'Barlow Condensed',sans-serif"></p>
        <p id="toast-msg"   class="text-xs mt-0.5" style="color:rgba(255,255,255,.6);font-family:'Barlow Condensed',sans-serif"></p>
      </div>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    // ─── Auth Guard ───
    auth.onAuthStateChanged(async (user) => {
      if (!user) return window.location.href = 'login.html';
      await carregarPerfil(user);
      await carregarMusicasMaisOuvidas(user.uid);
      await carregarFavoritos(user.uid);
    });

    // ─── Carregar Perfil ───
    async function carregarPerfil(user) {
      const snap = await db.collection('users').doc(user.uid).get();
      const d    = snap.data() || {};

      // Sidebar
      document.getElementById('edit-nome').value  = d.nome || '';
      document.getElementById('user-email-display').innerText = d.email || user.email || '';
      document.getElementById('edit-local').value  = d.localizacao || '';
      document.getElementById('edit-tel').value    = d.contacto    || '';
      document.getElementById('edit-gostos').value = d.gostos      || '';

      // Nav
      document.getElementById('nav-nome').innerText = d.nome || 'Utilizador';

      // Display
      const nome = d.nome || 'Utilizador';
      document.getElementById('display-name').innerText = nome.toUpperCase();

      if (d.fotoUrl) {
        document.getElementById('display-photo').src = d.fotoUrl;
        document.getElementById('display-photo').classList.remove('hidden');
        document.getElementById('display-initial').classList.add('hidden');
      } else {
        document.getElementById('display-initial').innerText = nome[0].toUpperCase();
      }

      // Role badge
      if (d.role === 'admin') {
        document.getElementById('display-role').innerText = 'GENERAL';
        document.getElementById('display-role').style.cssText = 'background:rgba(236,151,49,.2);color:#ec9731;display:inline-block;padding:3px 12px;border-radius:20px;font-family:Barlow Condensed,sans-serif;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px';
      }

      // Stats
      const likes     = (d.likes     || []).length;
      const plays     = d.totalPlays || 0;
      const downloads = d.totalDownloads || 0;
      document.getElementById('stat-likes').innerText     = likes;
      document.getElementById('stat-plays').innerText     = plays;
      document.getElementById('stat-downloads').innerText = downloads;
      document.getElementById('total-plays').innerText    = plays;

      // Rank (simples: cada 50 plays = 1 nível)
      const nivel = Math.max(1, Math.floor(plays / 50) + 1);
      document.getElementById('rank-nivel').innerText = nivel;
    }

    // ─── Salvar Perfil ───
    async function salvarPerfil() {
      const btn  = document.querySelector('.btn-save');
      const uid  = auth.currentUser?.uid;
      if (!uid) return;

      btn.textContent = 'A GUARDAR...';
      btn.disabled = true;

      try {
        await db.collection('users').doc(uid).update({
          nome:       document.getElementById('edit-nome').value.trim(),
          localizacao:document.getElementById('edit-local').value.trim(),
          contacto:   document.getElementById('edit-tel').value.trim(),
          gostos:     document.getElementById('edit-gostos').value.trim()
        });
        showToast('Guardado!', 'Perfil actualizado com sucesso.', 'success');
        document.getElementById('display-name').innerText =
          (document.getElementById('edit-nome').value.trim() || 'Utilizador').toUpperCase();
      } catch (e) {
        showToast('Erro', 'Não foi possível guardar.', 'error');
      } finally {
        btn.textContent = 'GUARDAR ALTERAÇÕES';
        btn.disabled = false;
      }
    }

    // ─── Foto ───
    async function processarFoto(input) {
      const file = input.files[0];
      const uid  = auth.currentUser?.uid;
      if (!file || !uid) return;

      showToast('A carregar...', 'A processar imagem...', 'info');
      try {
        const url = await uploadImagem(file, 'perfis');
        if (url) {
          await db.collection('users').doc(uid).update({ fotoUrl: url });
          document.getElementById('display-photo').src = url;
          document.getElementById('display-photo').classList.remove('hidden');
          document.getElementById('display-initial').classList.add('hidden');
          showToast('Foto actualizada!', '', 'success');
        }
      } catch (e) {
        showToast('Erro', 'Falha no upload da imagem.', 'error');
      }
    }

    function abrirCamera() {
      const inp = document.createElement('input');
      inp.type = 'file'; inp.accept = 'image/*'; inp.capture = 'user';
      inp.onchange = e => processarFoto(e.target);
      inp.click();
    }

    // ─── Músicas mais ouvidas ───
    async function carregarMusicasMaisOuvidas(uid) {
      const container = document.getElementById('lista-mais-ouvidas');
      try {
        const snap = await db.collection('users').doc(uid)
          .collection('estatisticas').orderBy('plays','desc').limit(5).get();

        if (snap.empty) {
          container.innerHTML = `<p style="font-family:'Barlow Condensed',sans-serif;font-size:.88rem;color:rgba(255,255,255,.3);padding:1rem 0">Ainda não ouviste nenhuma música.</p>`;
          return;
        }

        container.innerHTML = '';
        for (const statDoc of snap.docs) {
          const musicaDoc = await db.collection('playlist').doc(statDoc.id).get();
          if (!musicaDoc.exists) continue;
          const m = musicaDoc.data();
          const plays = statDoc.data().plays || 0;
          container.innerHTML += `
            <div class="music-card" style="background:rgba(25,32,53,.5)">
              <div class="w-11 h-11 rounded-xl overflow-hidden flex-shrink-0" style="background:rgba(49,69,149,.25)">
                ${m.capa ? `<img src="${m.capa}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center"><i class="fa-solid fa-music text-sm" style="color:rgba(255,255,255,.3)"></i></div>`}
              </div>
              <div class="flex-1 min-w-0">
                <p style="font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.titulo}</p>
                <p style="font-family:'Barlow Condensed',sans-serif;font-size:.78rem;color:rgba(255,255,255,.4);text-transform:uppercase">${m.artista}</p>
              </div>
              <div style="font-family:'Anton',sans-serif;font-size:.9rem;color:#ec9731;white-space:nowrap">${plays} plays</div>
            </div>`;
        }
      } catch (e) {
        container.innerHTML = `<p style="font-family:'Barlow Condensed',sans-serif;font-size:.85rem;color:rgba(255,255,255,.3)">Erro ao carregar histórico.</p>`;
      }
    }

    // ─── Favoritos ───
    async function carregarFavoritos(uid) {
      const container = document.getElementById('lista-favoritos');
      try {
        const snap = await db.collection('users').doc(uid).get();
        const likes = snap.data()?.likes || [];

        if (!likes.length) {
          container.innerHTML = `<p style="font-family:'Barlow Condensed',sans-serif;font-size:.88rem;color:rgba(255,255,255,.3);padding:1rem 0">Ainda não deste like em nenhuma música.</p>`;
          return;
        }

        container.innerHTML = '';
        for (const id of likes.slice(0, 10)) {
          const doc = await db.collection('playlist').doc(id).get();
          if (!doc.exists) continue;
          const m = doc.data();
          container.innerHTML += `
            <div class="music-card" style="background:rgba(25,32,53,.5)">
              <div class="w-11 h-11 rounded-xl overflow-hidden flex-shrink-0" style="background:rgba(49,69,149,.25)">
                ${m.capa ? `<img src="${m.capa}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center"><i class="fa-solid fa-music text-sm" style="color:rgba(255,255,255,.3)"></i></div>`}
              </div>
              <div class="flex-1 min-w-0">
                <p style="font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.95rem">${m.titulo}</p>
                <p style="font-family:'Barlow Condensed',sans-serif;font-size:.78rem;color:rgba(255,255,255,.4);text-transform:uppercase">${m.artista}</p>
              </div>
              <i class="fa-solid fa-heart" style="color:#ec9731;font-size:.9rem"></i>
            </div>`;
        }
      } catch (e) {
        container.innerHTML = `<p style="font-family:'Barlow Condensed',sans-serif;font-size:.85rem;color:rgba(255,255,255,.3)">Erro ao carregar favoritos.</p>`;
      }
    }

    function sair() {
      auth.signOut().then(() => window.location.href = 'login.html');
    }
  </script>
</body>
</html>
